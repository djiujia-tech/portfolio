<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact | Kuga Hiroki portfolio</title>
    <meta name="description" content="久家大樹へのお問い合わせ" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="l-header">
      <h1 class="header-logo">
        <a href="index.html">
          <div class="header-logo-img-box">
            <img
              src="img/Gemini_Generated_Image_wsdk3rwsdk3rwsdk.png"
              alt="logo"
              height="1312"
              width="816"
              class="l-header-logo_img"
            />
          </div>
        </a>
      </h1>
      <nav class="l-header__nav">
        <ul class="l-header__nav-list">
          <li><a href="works,index.html">Works</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <button
        class="m-header-hamburger"
        aria-label="メニューを開く"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main class="l_main">
      <section class="contact">
        <div class="l_container">
          <div class="m_section-title">
            <span class="m_section-title__sub">contact</span>
            <h2 class="m_section-title__main">お問い合わせ</h2>
          </div>

          <form class="contact__form" action="" method="post">
            <div class="contact__field">
              <label class="contact__label" for="name">
                氏名／会社名
                <span class="contact__required">（必須）</span>
              </label>
              <input
                class="contact__input"
                type="text"
                id="name"
                name="name"
                placeholder="〇〇　〇〇会社"
                required
              />
            </div>

            <div class="contact__field">
              <label class="contact__label" for="tel">
                電話番号
                <span class="contact__required">（必須）</span>
              </label>
              <input
                class="contact__input"
                type="tel"
                id="tel"
                name="tel"
                placeholder="ハイフンなし"
                required
              />
            </div>

            <div class="contact__field">
              <label class="contact__label" for="email">
                メールアドレス
                <span class="contact__required">（必須）</span>
              </label>
              <input
                class="contact__input"
                type="email"
                id="email"
                name="email"
                placeholder="mail@mail.com"
                required
              />
            </div>

            <div class="contact__field">
              <label class="contact__label" for="message">
                お問い合わせ内容
                <span class="contact__required">（必須）</span>
              </label>
              <textarea
                class="contact__textarea"
                id="message"
                name="message"
                placeholder="フリーテキスト"
                rows="6"
                required
              ></textarea>
            </div>

            <div class="contact__submit">
              <button type="submit" class="m_button">送信</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="l-footer">
      <nav class="l-footer__nav">
        <ul class="l-footer__nav-list">
          <li class="l-footer__nav-item">
            <a href="index.html" class="l-footer__nav-link">Top</a>
          </li>
          <li class="l-footer__nav-item">
            <a href="works/index.html" class="l-footer__nav-link">Work</a>
          </li>
          <li class="l-footer__nav-item">
            <a href="about.html" class="l-footer__nav-link">About</a>
          </li>
          <li class="l-footer__nav-item">
            <a href="contact.html" class="l-footer__nav-link">Contact</a>
          </li>
        </ul>
      </nav>
      <p class="l-footer__copyright">
        <small>© 2026 Hiroki Kuga</small>
      </p>
    </footer>

    <script src="js/main.js" defer></script>
  </body>
</html>
